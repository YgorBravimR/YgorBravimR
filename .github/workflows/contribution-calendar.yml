name: Generate Contribution Calendar

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate contribution calendars
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const USERNAME = 'ygorbravimr';
            const CELL = 11;
            const GAP = 3;
            const STEP = CELL + GAP;
            const ML = 32;
            const MT = 22;
            const TH = 28;
            const LH = 30;

            const WEEKDAY = ['#161B22', '#0D3B66', '#1565C0', '#1E88E5', '#00D4FF'];
            const WEEKEND = ['#161B22', '#4A1525', '#C62828', '#E63946', '#FF2D55'];
            const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const FONT = `-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif`;

            function color(count, isWe) {
              const c = isWe ? WEEKEND : WEEKDAY;
              if (count === 0) return c[0];
              if (count <= 2) return c[1];
              if (count <= 4) return c[2];
              if (count <= 7) return c[3];
              return c[4];
            }

            async function generate(year) {
              const res = await github.graphql(`
                query($u: String!, $from: DateTime!, $to: DateTime!) {
                  user(login: $u) {
                    contributionsCollection(from: $from, to: $to) {
                      contributionCalendar {
                        totalContributions
                        weeks { contributionDays { contributionCount date weekday } }
                      }
                    }
                  }
                }
              `, { u: USERNAME, from: `${year}-01-01T00:00:00Z`, to: `${year}-12-31T23:59:59Z` });

              const cal = res.user.contributionsCollection.contributionCalendar;
              const weeks = cal.weeks;
              const total = cal.totalContributions;
              const W = ML + weeks.length * STEP + 15;
              const H = TH + MT + 7 * STEP + LH + 5;

              let mp = [], pm = -1;
              weeks.forEach((w, i) => {
                if (w.contributionDays.length) {
                  const m = new Date(w.contributionDays[0].date).getMonth();
                  if (m !== pm) { mp.push({ n: MONTHS[m], x: ML + i * STEP }); pm = m; }
                }
              });

              let s = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">\n`;
              s += `<rect width="${W}" height="${H}" fill="#0D1117" rx="6"/>\n`;
              s += `<text x="${ML}" y="18" fill="#FFD700" font-size="13" font-weight="600" font-family="${FONT}">${total.toLocaleString()} contributions in ${year}</text>\n`;

              mp.forEach(({n, x}) => {
                s += `<text x="${x}" y="${TH + 12}" fill="#8B949E" font-size="10" font-family="${FONT}">${n}</text>\n`;
              });

              [{r:1,l:'Mon'},{r:3,l:'Wed'},{r:5,l:'Fri'}].forEach(({r,l}) => {
                s += `<text x="0" y="${TH + MT + r * STEP + CELL - 1}" fill="#8B949E" font-size="10" font-family="${FONT}">${l}</text>\n`;
              });

              weeks.forEach((w, wi) => {
                w.contributionDays.forEach(d => {
                  const x = ML + wi * STEP;
                  const y = TH + MT + d.weekday * STEP;
                  const we = d.weekday === 0 || d.weekday === 6;
                  s += `<rect x="${x}" y="${y}" width="${CELL}" height="${CELL}" fill="${color(d.contributionCount, we)}" rx="2"><title>${d.date}: ${d.contributionCount} contributions${we ? ' (weekend)' : ''}</title></rect>\n`;
                });
              });

              const ly = TH + MT + 7 * STEP + 8;
              const lx = W - 300;
              s += `<text x="${lx}" y="${ly + 9}" fill="#8B949E" font-size="10" font-family="${FONT}">Less</text>\n`;

              let bx = lx + 28;
              WEEKDAY.forEach((c, i) => { s += `<rect x="${bx + i * 13}" y="${ly}" width="${CELL}" height="${CELL}" fill="${c}" rx="2"/>\n`; });
              s += `<text x="${bx + 5 * 13 + 2}" y="${ly + 9}" fill="#00D4FF" font-size="10" font-weight="600" font-family="${FONT}">Weekday</text>\n`;

              let rx = bx + 5 * 13 + 58;
              WEEKEND.forEach((c, i) => { s += `<rect x="${rx + i * 13}" y="${ly}" width="${CELL}" height="${CELL}" fill="${c}" rx="2"/>\n`; });
              s += `<text x="${rx + 5 * 13 + 2}" y="${ly + 9}" fill="#FF2D55" font-size="10" font-weight="600" font-family="${FONT}">Weekend</text>\n`;
              s += `<text x="${rx + 5 * 13 + 58}" y="${ly + 9}" fill="#8B949E" font-size="10" font-family="${FONT}">More</text>\n`;

              s += `</svg>`;
              return s;
            }

            const now = new Date().getFullYear();
            fs.mkdirSync('dist', { recursive: true });

            for (const y of [now, now - 1, now - 2]) {
              try {
                fs.writeFileSync(`dist/contribution-calendar-${y}.svg`, await generate(y));
                core.info(`Generated calendar for ${y}`);
              } catch (e) {
                core.warning(`Failed for ${y}: ${e.message}`);
              }
            }

      - name: Push to calendar branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: calendar
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
